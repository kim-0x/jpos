<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPOS Reports Dashboard</title>
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <header class="page-header">
      <div>
        <p class="eyebrow">Reports</p>
        <h1>JPOS Reporting Dashboard</h1>
        <p class="page-description">Review monthly inventory and sales performance in one printable report view.</p>
      </div>
      <div class="report-meta">
        <div class="meta-item">
          <span class="meta-label">Report</span>
          <strong id="currentReportLabel">Inventory Report</strong>
        </div>
        <div class="meta-item">
          <span class="meta-label">Period</span>
          <strong id="currentReportDate">Loading...</strong>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="controls-panel screen-only">
        <div class="controls-header">
          <div>
            <p class="section-kicker">Filters</p>
            <h2>Choose a report view</h2>
          </div>
          <button type="button" class="print-button" onclick="window.print()">Print Report</button>
        </div>

        <div class="controls">
          <label class="control-field">Report Month
            <select id="monthFilter" onchange="handleFilterChange()"></select>
          </label>
          <label class="control-field">Report Year
            <select id="yearFilter" onchange="handleYearChange()"></select>
          </label>
          <label class="control-field search-field">Search Product
            <input id="search" placeholder="Search product..." oninput="renderCurrent()">
          </label>
        </div>

        <div class="report-switch" aria-label="Report type">
          <button id="inventoryButton" type="button" class="report-button" onclick="showReport('inventory')">Inventory Report</button>
          <button id="salesButton" type="button" class="report-button" onclick="showReport('sales')">Sales Report</button>
        </div>
      </section>

      <section class="summary-section">
        <div class="section-heading">
          <p class="section-kicker">Overview</p>
          <h2>Summary</h2>
        </div>
        <div id="summary"></div>
      </section>

      <section class="report-section">
        <div class="section-heading">
          <p class="section-kicker">Details</p>
          <h2 id="reportSectionTitle">Inventory Report</h2>
        </div>
        <div id="report"></div>
      </section>
    </main>

    <script>
      const reportData = {
        filter: [],
        inventory: [],
        sales: []
      };

      const monthOrder = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

      fetch("./json/report-filter.json").then(r => r.json()).then(data => {
        reportData.filter = Array.isArray(data.reportDate) ? data.reportDate : [];

        const loadingPromises = reportData.filter.map(reportDate => {
          const saleReportFilename = `sale-report__${reportDate}.json`;
          const inventoryReportFilename = `inventory-report__${reportDate}.json`;

          return Promise.all([
            fetch(`./json/${saleReportFilename}`)
              .then(r => r.json())
              .then(saleData => { reportData.sales.push(saleData); })
              .catch(e => console.error("Error loading sales report:", e)),
            fetch(`./json/${inventoryReportFilename}`)
              .then(r => r.json())
              .then(inventoryData => { reportData.inventory.push(inventoryData); })
              .catch(e => console.error("Error loading inventory report:", e))
          ]);
        });

        Promise.all(loadingPromises).then(() => {
          if (reportData.filter.length === 0) {
            renderNoData("No data available");
            return;
          }
          initDateFilters();
          renderCurrent();
          console.log("Report Data Loaded:", reportData);
        });
      });

      let current = "inventory";

      function money(v) {
        return "$" + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function showReport(type) {
        current = type;
        renderCurrent();
      }

      function updateReportButtons() {
        const inventoryButton = document.getElementById("inventoryButton");
        const salesButton = document.getElementById("salesButton");
        const isInventory = current === "inventory";

        inventoryButton.classList.toggle("active", isInventory);
        salesButton.classList.toggle("active", !isInventory);
        inventoryButton.setAttribute("aria-pressed", String(isInventory));
        salesButton.setAttribute("aria-pressed", String(!isInventory));
      }

      function splitReportDate(reportDate) {
        const [month, year] = reportDate.split("-");
        return { month, year };
      }

      function initDateFilters() {
        const yearFilter = document.getElementById("yearFilter");
        const yearValues = [...new Set(reportData.filter.map(d => splitReportDate(d).year))]
          .sort((a, b) => Number(b) - Number(a));

        yearFilter.innerHTML = yearValues.map(y => `<option value="${y}">${y}</option>`).join("");

        if (yearValues.length > 0) {
          updateMonthFilter(yearValues[0]);
        }
      }

      function updateMonthFilter(selectedYear) {
        const monthFilter = document.getElementById("monthFilter");
        const monthValues = reportData.filter
          .map(splitReportDate)
          .filter(d => d.year === selectedYear)
          .map(d => d.month)
          .sort((a, b) => monthOrder.indexOf(b) - monthOrder.indexOf(a));

        monthFilter.innerHTML = monthValues.map(m => `<option value="${m}">${m}</option>`).join("");
      }

      function getSelectedReportDate() {
        const month = document.getElementById("monthFilter").value;
        const year = document.getElementById("yearFilter").value;
        return `${month}-${year}`;
      }

      function handleYearChange() {
        const selectedYear = document.getElementById("yearFilter").value;
        updateMonthFilter(selectedYear);
        renderCurrent();
      }

      function handleFilterChange() {
        renderCurrent();
      }

      function updateReportMeta(reportDate) {
        const reportLabel = document.getElementById("currentReportLabel");
        const reportDateLabel = document.getElementById("currentReportDate");
        const reportSectionTitle = document.getElementById("reportSectionTitle");
        const reportName = current === "inventory" ? "Inventory Report" : "Sales Report";

        reportLabel.textContent = reportName;
        reportDateLabel.textContent = reportDate && reportDate !== "-" ? reportDate : "No data available";
        reportSectionTitle.textContent = reportName;
        updateReportButtons();
      }

      function getReportByDate(list, reportDate) {
        return list.find(item => item.reportDate === reportDate) || null;
      }

      function renderNoData(message) {
        const report = document.getElementById("report");
        const summary = document.getElementById("summary");
        summary.innerHTML = "";
        report.innerHTML = `
          <div class="report-card">
            <table class="report-table">
              <tr><th>Name</th><th class="qty">Qty</th><th>Status/Revenue</th><th class="money-header">Cost</th><th class="money-header">Value/Profit</th></tr>
              <tr><td class="empty" colspan="5">${message}</td></tr>
            </table>
          </div>
        `;
      }

      function renderCurrent() {
        const search = document.getElementById("search").value.toLowerCase();
        const report = document.getElementById("report");
        const summary = document.getElementById("summary");

        const selectedReportDate = getSelectedReportDate();
        updateReportMeta(selectedReportDate);

        if (!selectedReportDate || selectedReportDate === "-") {
          renderNoData("No data available");
          return;
        }

        if (current === "inventory") {
          const data = getReportByDate(reportData.inventory, selectedReportDate);
          if (!data) {
            renderNoData("No data available");
            return;
          }
          const items = data.items.filter(i => i.name.toLowerCase().includes(search));

          summary.innerHTML = `
            <div class="cards">
                <article class="card">
                  <span class="card-label">Total Inventory Value</span>
                  <strong class="card-value">${money(data.totalInventoryValue)}</strong>
                </article>
                <article class="card">
                  <span class="card-label">Products</span>
                  <strong class="card-value">${data.items.length}</strong>
                </article>
                <article class="card">
                  <span class="card-label">Report Date</span>
                  <strong class="card-value">${data.reportDate}</strong>
                </article>
            </div>
          `;

          report.innerHTML = `
            <div class="report-card">
              <div class="table-wrap">
                <table class="report-table">
                  <tr><th>Name</th><th class="qty">Qty</th><th>Status</th><th class="money-header">Latest Cost</th><th class="money-header">Stock Value</th></tr>
                  ${items.length === 0 ? `<tr><td class="empty" colspan="5">No data available</td></tr>` : ""}
                  ${items.map(i => `
                      <tr>
                        <td>${i.name}</td>
                        <td class="qty">${i.qty}</td>
                        <td><span class="status-pill">${i.status}</span></td>
                        <td class="money">${money(i.cost)}</td>
                        <td class="money">${money(i.value)}</td>
                      </tr>`).join("")}
                </table>
              </div>
            </div>
          `;
        } else {
          const data = getReportByDate(reportData.sales, selectedReportDate);
          if (!data) {
            renderNoData("No data available");
            return;
          }
          const items = data.items.filter(i => i.name.toLowerCase().includes(search));

          summary.innerHTML = `
            <div class="cards">
                <article class="card">
                  <span class="card-label">Total Revenue</span>
                  <strong class="card-value">${money(data.totalRevenue)}</strong>
                </article>
                <article class="card">
                  <span class="card-label">Total Cost</span>
                  <strong class="card-value">${money(data.totalCost)}</strong>
                </article>
                <article class="card">
                  <span class="card-label">Total Profit</span>
                  <strong class="card-value">${money(data.totalProfit)}</strong>
                </article>
            </div>
          `;

          report.innerHTML = `
            <div class="report-card">
              <div class="table-wrap">
                <table class="report-table">
                  <tr><th>Name</th><th class="qty">Qty</th><th class="money-header">Revenue</th><th class="money-header">Cost</th><th class="money-header">Profit</th></tr>
                  ${items.length === 0 ? `<tr><td class="empty" colspan="5">No data available</td></tr>` : ""}
                  ${items.map(i => `
                      <tr>
                        <td>${i.name}</td>
                        <td class="qty">${i.qty}</td>
                        <td class="money">${money(i.revenue)}</td>
                        <td class="money">${money(i.cost)}</td>
                        <td class="money">${money(i.profit)}</td>
                      </tr>`).join("")}
                </table>
              </div>
            </div>
          `;
        }
      }

      renderNoData("Loading report data...");
    </script>

  </body>
</html>
