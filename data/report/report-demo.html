<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPOS Reports Dashboard</title>
    <style>
      
    </style>
  </head>

  <body>
    <header>
      <h1>JPOS Reporting Dashboard</h1>
    </header>

    <div class="container">

      <div class="controls">
        <label>Report Month:
          <select id="monthFilter" onchange="handleFilterChange()"></select>
        </label>
        <label>Report Year:
          <select id="yearFilter" onchange="handleYearChange()"></select>
        </label>
        <button onclick="showReport('inventory')">Inventory Report</button>
        <button onclick="showReport('sales')">Sales Report</button>
        <input id="search" placeholder="Search product..." oninput="renderCurrent()">
      </div>

      <div id="summary"></div>

      <div id="report"></div>

    </div>

    <script>
      const reportData = {
        filter: [],
        inventory: [],
        sales: []
      };

      const monthOrder = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

      fetch("./json/report-filter.json").then(r => r.json()).then(data => {
        reportData.filter = Array.isArray(data.reportDate) ? data.reportDate : [];

        const loadingPromises = reportData.filter.map(reportDate => {
          const saleReportFilename = `sale-report__${reportDate}.json`;
          const inventoryReportFilename = `inventory-report__${reportDate}.json`;

          return Promise.all([
            fetch(`./json/${saleReportFilename}`)
              .then(r => r.json())
              .then(saleData => { reportData.sales.push(saleData); })
              .catch(e => console.error("Error loading sales report:", e)),
            fetch(`./json/${inventoryReportFilename}`)
              .then(r => r.json())
              .then(inventoryData => { reportData.inventory.push(inventoryData); })
              .catch(e => console.error("Error loading inventory report:", e))
          ]);
        });

        Promise.all(loadingPromises).then(() => {
          if (reportData.filter.length === 0) {
            renderNoData("No data available");
            return;
          }
          initDateFilters();
          renderCurrent();
          console.log("Report Data Loaded:", reportData);
        });
      });

      let current = "inventory";

      function money(v) {
        return "$" + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function showReport(type) {
        current = type;
        renderCurrent();
      }

      function splitReportDate(reportDate) {
        const [month, year] = reportDate.split("-");
        return { month, year };
      }

      function initDateFilters() {
        const yearFilter = document.getElementById("yearFilter");
        const yearValues = [...new Set(reportData.filter.map(d => splitReportDate(d).year))]
          .sort((a, b) => Number(b) - Number(a));

        yearFilter.innerHTML = yearValues.map(y => `<option value="${y}">${y}</option>`).join("");

        if (yearValues.length > 0) {
          updateMonthFilter(yearValues[0]);
        }
      }

      function updateMonthFilter(selectedYear) {
        const monthFilter = document.getElementById("monthFilter");
        const monthValues = reportData.filter
          .map(splitReportDate)
          .filter(d => d.year === selectedYear)
          .map(d => d.month)
          .sort((a, b) => monthOrder.indexOf(b) - monthOrder.indexOf(a));

        monthFilter.innerHTML = monthValues.map(m => `<option value="${m}">${m}</option>`).join("");
      }

      function getSelectedReportDate() {
        const month = document.getElementById("monthFilter").value;
        const year = document.getElementById("yearFilter").value;
        return `${month}-${year}`;
      }

      function handleYearChange() {
        const selectedYear = document.getElementById("yearFilter").value;
        updateMonthFilter(selectedYear);
        renderCurrent();
      }

      function handleFilterChange() {
        renderCurrent();
      }

      function getReportByDate(list, reportDate) {
        return list.find(item => item.reportDate === reportDate) || null;
      }

      function renderNoData(message) {
        const report = document.getElementById("report");
        const summary = document.getElementById("summary");
        summary.innerHTML = "";
        report.innerHTML = `
          <table>
            <tr><th>Name</th><th class="money-header">Qty</th><th>Status/Revenue</th><th class="money-header">Cost</th><th class="money-header">Value/Profit</th></tr>
            <tr><td class="empty" colspan="5">${message}</td></tr>
          </table>
        `;
      }

      function renderCurrent() {
        const search = document.getElementById("search").value.toLowerCase();
        const report = document.getElementById("report");
        const summary = document.getElementById("summary");

        const selectedReportDate = getSelectedReportDate();

        if (!selectedReportDate || selectedReportDate === "-") {
          renderNoData("No data available");
          return;
        }

        if (current === "inventory") {
          const data = getReportByDate(reportData.inventory, selectedReportDate);
          if (!data) {
            renderNoData("No data available");
            return;
          }
          const items = data.items.filter(i => i.name.toLowerCase().includes(search));

          summary.innerHTML = `
            <div class="cards">
                <div class="card"><h3>Total Inventory Value</h3><h2>${money(data.totalInventoryValue)}</h2></div>
                <div class="card"><h3>Products</h3><h2>${data.items.length}</h2></div>
                <div class="card"><h3>Report Date</h3><h2>${data.reportDate}</h2></div>
            </div>
          `;

          report.innerHTML = `
            <table>
              <tr><th>Name</th><th class="money-header">Qty</th><th>Status</th><th class="money-header">Latest Cost</th><th class="money-header">Stock Value</th></tr>
              ${items.length === 0 ? `<tr><td class="empty" colspan="5">No data available</td></tr>` : ""}
              ${items.map(i => `
                  <tr>
                    <td>${i.name}</td>
                    <td>${i.qty}</td>
                    <td>${i.status}</td>
                    <td class="money">${money(i.cost)}</td>
                    <td class="money">${money(i.value)}</td>
                  </tr>`).join("")}
            </table>
          `;
        } else {
          const data = getReportByDate(reportData.sales, selectedReportDate);
          if (!data) {
            renderNoData("No data available");
            return;
          }
          const items = data.items.filter(i => i.name.toLowerCase().includes(search));

          summary.innerHTML = `
            <div class="cards">
                <div class="card"><h3>Total Revenue</h3><h2>${money(data.totalRevenue)}</h2></div>
                <div class="card"><h3>Total Cost</h3><h2>${money(data.totalCost)}</h2></div>
                <div class="card"><h3>Total Profit</h3><h2>${money(data.totalProfit)}</h2></div>
            </div>
          `;

          report.innerHTML = `
            <table>
              <tr><th>Name</th><th class="money-header">Qty</th><th class="money-header">Revenue</th><th class="money-header">Cost</th><th class="money-header">Profit</th></tr>
              ${items.length === 0 ? `<tr><td class="empty" colspan="5">No data available</td></tr>` : ""}
              ${items.map(i => `
                  <tr>
                    <td>${i.name}</td>
                    <td>${i.qty}</td>
                    <td class="money">${money(i.revenue)}</td>
                    <td class="money">${money(i.cost)}</td>
                    <td class="money">${money(i.profit)}</td>
                  </tr>`).join("")}
            </table>
          `;
        }
      }

      renderNoData("Loading report data...");
    </script>

  </body>
</html>
